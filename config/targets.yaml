# Target Configuration
# Define which networks to include/exclude from scanning and attacks

# WARNING: Only test networks you own or have explicit permission to test
# Unauthorized network attacks are illegal and unethical

targets:
  # Networks to specifically target
  include:
    # Specific SSIDs
    ssids:
      - "TestNetwork"
      - "MyHomeWiFi"
      - "Lab-Network"
    
    # SSID patterns (regex supported)
    patterns:
      - "^Test-.*"       # Any SSID starting with "Test-"
      - ".*-Guest$"      # Any SSID ending with "-Guest"
      - "^Lab[0-9]+$"    # Lab followed by numbers
    
    # Specific BSSIDs (MAC addresses)
    bssids:
      - "AA:BB:CC:DD:EE:FF"
      - "11:22:33:44:55:66"
    
    # Encryption types to focus on
    encryption_types:
      - "WPA2-PSK"
      - "WPA-PSK"
      - "WPS"
      - "Open"  # For Evil Twin attacks
    
    # Signal strength threshold (minimum RSSI)
    min_signal: -75  # dBm
    
    # Channel preferences
    channels:
      prefer: [1, 6, 11]  # Common 2.4GHz channels
      scan_5ghz: true     # Include 5GHz channels
      scan_6ghz: false    # Include 6GHz channels (WiFi 6E)
  
  # Networks to NEVER attack
  exclude:
    # Critical infrastructure - NEVER ATTACK
    critical:
      - pattern: ".*Hospital.*"
      - pattern: ".*Medical.*"
      - pattern: ".*Emergency.*"
      - pattern: ".*911.*"
      - pattern: ".*Police.*"
      - pattern: ".*Fire.*"
      - pattern: ".*Ambulance.*"
    
    # Honeypot indicators
    honeypots:
      - "FBI Surveillance Van"
      - "NSA"
      - "DEA Surveillance"
      - pattern: ".*Surveillance.*"
      - pattern: ".*FBI.*"
      - pattern: ".*CIA.*"
    
    # Specific SSIDs to exclude
    ssids:
      - "Neighbor-WiFi"
      - "Corporate-Secure"
    
    # Specific BSSIDs to exclude
    bssids:
      - "DE:AD:BE:EF:00:00"
    
    # Encryption types to skip
    encryption_types:
      - "WPA3"        # Too new/secure
      - "Enterprise"  # 802.1X networks
      - "RADIUS"      # Enterprise auth
  
  # Priority scoring for target selection
  priority:
    # Factors that increase priority (higher = more likely to attack)
    high_priority:
      - factor: "WPS_ENABLED"
        score: 10
        reason: "WPS vulnerable to PIN attacks"
      
      - factor: "WEAK_SIGNAL"
        score: 8
        range: [-90, -80]  # dBm
        reason: "Weak signal often means weak security"
      
      - factor: "OLD_ENCRYPTION"
        score: 7
        types: ["WEP", "WPA"]
        reason: "Outdated encryption"
      
      - factor: "DEFAULT_SSID"
        score: 6
        patterns:
          - "NETGEAR[0-9]+"
          - "Linksys[0-9]+"
          - "TP-LINK_[0-9A-F]+"
        reason: "Default SSID suggests default password"
    
    medium_priority:
      - factor: "COMMON_SSID"
        score: 5
        patterns:
          - "Home"
          - "Office"
          - "Guest"
        reason: "Common names often have weak passwords"
      
      - factor: "HIDDEN_SSID"
        score: 4
        reason: "Hidden networks often have false sense of security"
    
    low_priority:
      - factor: "STRONG_SIGNAL"
        score: 2
        range: [-30, -60]  # dBm
        reason: "Nearby network"
      
      - factor: "ACTIVE_CLIENTS"
        score: 3
        min_clients: 1
        reason: "Active clients for deauth"
  
  # Attack strategies based on target type
  strategies:
    WPS_ENABLED:
      primary: "pixie_dust"
      fallback: "pin_bruteforce"
      timeout: 300  # seconds
    
    WPA2_PSK:
      primary: "handshake_capture"
      deauth_strategy: "targeted"  # or "broadcast"
      crack_strategy: "dictionary"  # or "bruteforce", "rule-based"
    
    OPEN_NETWORK:
      primary: "evil_twin"
      portal_type: "captive"
      harvest: "credentials"
    
    WEP:
      primary: "arp_replay"
      packets_needed: 50000
      
# Operational parameters
operations:
  scanning:
    interval: 5         # Seconds between scans
    duration: 60        # Scan duration in seconds
    channel_hop: 0.5    # Channel hop interval
    
  deauth:
    burst_size: 10      # Deauth packets per burst
    burst_delay: 0.1    # Delay between bursts
    target_clients: true  # Target specific clients
    
  handshake:
    timeout: 300        # Max time to wait for handshake
    quality_threshold: 2  # Minimum EAPOL messages
    
  cracking:
    local_timeout: 3600    # 1 hour local CPU cracking
    gpu_timeout: 86400     # 24 hours GPU cracking
    
# Legal disclaimer
legal:
  disclaimer: |
    WARNING: This tool is for authorized security testing only.
    Only test networks you own or have explicit written permission to test.
    Unauthorized access to computer networks is illegal and punishable by law.
    The developers assume no liability for misuse of this software.
  
  require_confirmation: true
  confirmation_text: "I have permission to test these networks"