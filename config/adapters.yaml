# WiFi Adapter Configuration
# Defines supported adapters, their drivers, and capabilities

adapters:
  # ALFA AWUS036ACH - Primary monitoring adapter
  rtl8812au:
    name: "ALFA AWUS036ACH"
    description: "Dual-band AC1200 adapter with excellent range"
    usb_ids:
      - "0bda:8812"  # RTL8812AU
      - "0bda:8811"  # RTL8811AU variant
    chipset: "Realtek RTL8812AU"
    driver:
      package: "realtek-rtl88xxau-dkms"
      source: "https://github.com/aircrack-ng/rtl8812au"
      version: "5.6.4.2"
    capabilities:
      monitor_mode: true
      packet_injection: true
      frequency_bands: ["2.4GHz", "5GHz"]
      wifi_standards: ["802.11a", "802.11b", "802.11g", "802.11n", "802.11ac"]
      max_tx_power: 30  # dBm
      antenna_gain: 5   # dBi
    recommended_role: "monitoring"
    setup_commands:
      - "ip link set {interface} down"
      - "iw dev {interface} set type monitor"
      - "ip link set {interface} up"
    
  # ALFA AWUS036AXML - Secondary injection adapter
  mt7921u:
    name: "ALFA AWUS036AXML"
    description: "WiFi 6 tri-band adapter with superior injection"
    usb_ids:
      - "0e8d:7961"  # MediaTek MT7921U
    chipset: "MediaTek MT7921U"
    driver:
      package: "firmware-misc-nonfree"  # Includes MT7921 firmware
      source: "kernel"  # Mainline kernel support
      version: "5.15+"
    capabilities:
      monitor_mode: true
      packet_injection: true
      frequency_bands: ["2.4GHz", "5GHz", "6GHz"]
      wifi_standards: ["802.11a", "802.11b", "802.11g", "802.11n", "802.11ac", "802.11ax"]
      wifi_version: 6
      max_tx_power: 30  # dBm
      antenna_gain: 5   # dBi
      injection_success_rate: 0.93  # 93% based on testing
    recommended_role: "injection"
    setup_commands:
      - "ip link set {interface} down"
      - "iw dev {interface} set type monitor"
      - "ip link set {interface} up"
      - "iw dev {interface} set txpower fixed 3000"  # 30dBm
    
  # ALFA AWUS036NH - Legacy but reliable
  rt3070:
    name: "ALFA AWUS036NH"
    description: "Classic N adapter with excellent compatibility"
    usb_ids:
      - "148f:3070"  # Ralink RT3070
      - "148f:3072"  # RT3072 variant
    chipset: "Ralink RT3070"
    driver:
      package: "firmware-ralink"
      source: "kernel"
      version: "all"
    capabilities:
      monitor_mode: true
      packet_injection: true
      frequency_bands: ["2.4GHz"]
      wifi_standards: ["802.11b", "802.11g", "802.11n"]
      max_tx_power: 30  # dBm
      antenna_gain: 5   # dBi
    recommended_role: "legacy_support"
    
  # ALFA AWUS1900 - High-power AC adapter
  rtl8814au:
    name: "ALFA AWUS1900"
    description: "4x4 MIMO AC1900 adapter"
    usb_ids:
      - "0bda:8813"  # RTL8814AU
    chipset: "Realtek RTL8814AU"
    driver:
      package: "realtek-rtl8814au-dkms"
      source: "https://github.com/aircrack-ng/rtl8814au"
      version: "5.8.5.1"
    capabilities:
      monitor_mode: true
      packet_injection: true
      frequency_bands: ["2.4GHz", "5GHz"]
      wifi_standards: ["802.11a", "802.11b", "802.11g", "802.11n", "802.11ac"]
      mimo: "4x4"
      max_tx_power: 30  # dBm
      antenna_gain: 5   # dBi
    recommended_role: "high_power"
    
  # Built-in Atheros (detected on system)
  ath9k:
    name: "Atheros AR9xxx"
    description: "Built-in WiFi adapter"
    usb_ids:
      - "0cf3:e009"
    pci_ids:
      - "168c:002*"  # Various AR9xxx models
    chipset: "Qualcomm Atheros"
    driver:
      package: "firmware-atheros"
      source: "kernel"
      version: "all"
    capabilities:
      monitor_mode: true
      packet_injection: true
      frequency_bands: ["2.4GHz", "5GHz"]
      wifi_standards: ["802.11a", "802.11b", "802.11g", "802.11n"]
      max_tx_power: 20  # dBm
    recommended_role: "management"

# Driver installation commands
driver_installation:
  realtek-rtl88xxau-dkms:
    commands:
      - "sudo apt update"
      - "sudo apt install -y dkms git build-essential"
      - "sudo apt install -y realtek-rtl88xxau-dkms"
    fallback:
      - "git clone https://github.com/aircrack-ng/rtl8812au.git"
      - "cd rtl8812au"
      - "sudo make dkms_install"
      
  realtek-rtl8814au-dkms:
    commands:
      - "sudo apt update"
      - "sudo apt install -y dkms git build-essential"
      - "git clone https://github.com/aircrack-ng/rtl8814au.git"
      - "cd rtl8814au"
      - "sudo make dkms_install"
      
  firmware-ralink:
    commands:
      - "sudo apt update"
      - "sudo apt install -y firmware-ralink"
      
  firmware-atheros:
    commands:
      - "sudo apt update"
      - "sudo apt install -y firmware-atheros"
      
  firmware-misc-nonfree:
    commands:
      - "sudo apt update"
      - "sudo apt install -y firmware-misc-nonfree"

# Adapter testing procedures
testing:
  monitor_mode:
    commands:
      - "sudo ip link set {interface} down"
      - "sudo iw dev {interface} set type monitor"
      - "sudo ip link set {interface} up"
      - "sudo iw dev {interface} info | grep type"
    expected_output: "type monitor"
    
  injection_test:
    commands:
      - "sudo aireplay-ng --test {interface}"
    success_indicators:
      - "Injection is working!"
      - "Found 1 AP"
      - "30/30"
    
  channel_hop:
    commands:
      - "sudo iwconfig {interface} channel {channel}"
      - "sudo iw dev {interface} info | grep channel"